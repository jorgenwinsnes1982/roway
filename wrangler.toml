# Cloudflare Workers configuration for ROWAY
# Static assets are served from the Vite build output.
# API routes are handled by src/worker.js.

name = "roway"
main = "src/worker.js"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"

# KV namespaces used by the API routes.
[[kv_namespaces]]
binding = "leaderboard"
id = "3950e81ea93144c683c53cc260b09fda"

[[kv_namespaces]]
binding = "nonces"
id = "8a4d657501904673a8af5a8c437be657"

[[kv_namespaces]]
binding = "rate"
id = "57581bb794f1449283d39e8e589d2297"

[[kv_namespaces]]
binding = "challenges"
id = "6b1b9257e41a460e8f56370aa13f05c8"

[[kv_namespaces]]
binding = "voyageScores"
id = "e02659b51f664fe49e65983ec955d5d7"
